<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | SecuriScan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #d0d4dc 0%, #edeff1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            background: rgba(79, 99, 132, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            
            <div class="text-center mb-5">
                <h2 class="text-dark fw-bold"><i class="bi bi-shield-lock-fill text-primary"></i> SecuriScan</h2>
                <p class="text-dark-50">Welcome back, security researcher.</p>
            </div>

            <div class="card login-card shadow-lg p-4 rounded-4 text-white">
                <div class="card-body">
                    <div id="loginAlert" class="alert d-none py-2 small" role="alert"></div>
                    
                    <form id="loginForm" autocomplete="off">
                        <!-- Username -->
                        <div class="mb-4">
                            <label class="form-label text-white-50 small fw-bold">USERNAME</label>
                            <input type="text" id="username" class="form-control bg-dark border-0 text-white p-3" 
                                   placeholder="Enter your username" required autocomplete="off">
                        </div>
                        
                        <!-- Password with Visibility Toggle -->
                        <div class="mb-4">
                            <label class="form-label text-white-50 small fw-bold">PASSWORD</label>
                            <div class="input-group">
                                <input type="password" id="password" class="form-control bg-dark border-0 text-white p-3" 
                                       placeholder="••••••••" required autocomplete="new-password">
                                <button type="button" class="btn btn-dark border-0 px-3" onclick="togglePassword()">
                                    <i class="bi bi-eye" id="toggleIcon"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" id="loginBtn" class="btn btn-primary w-100 fw-bold py-3 shadow">SIGN IN</button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <p class="text-dark-50 small">New user? <a href="register.html" class="text-primary fw-bold text-decoration-none">Register here</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Force Reset on Page Load
    window.addEventListener('pageshow', () => {
        const btn = document.getElementById('loginBtn');
        const form = document.getElementById('loginForm');
        btn.innerText = "SIGN IN";
        btn.disabled = false;
        form.reset();
    });

    // 2. Password Visibility Toggle
    function togglePassword() {
        const passInput = document.getElementById('password');
        const icon = document.getElementById('toggleIcon');
        if (passInput.type === "password") {
            passInput.type = "text";
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            passInput.type = "password";
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }

    // 3. Login Logic
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const alertBox = document.getElementById('loginAlert');
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        btn.innerText = "AUTHENTICATING...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append('username', user);
        formData.append('password', pass);

        try {
            const res = await fetch('../backend/api_login.php', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.status === 'success') {
                window.location.href = data.role === 'admin' ? 'admin.html' : 'dashboard.html';
            } else {
                alertBox.className = "alert alert-danger py-2 small";
                alertBox.innerText = data.message;
                btn.innerText = "SIGN IN";
                btn.disabled = false;
            }
        } catch (err) {
            alertBox.className = "alert alert-danger py-2 small";
            alertBox.innerText = "Connection Error: Check server status.";
            btn.innerText = "SIGN IN";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
