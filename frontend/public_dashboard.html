<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuriScan - Public Analysis Workspace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="js/public_dashboard.js" defer></script>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
                <i class="bi bi-shield-lock-fill text-primary fs-4 me-2"></i>SecuriScan Terminal
            </a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <span class="badge bg-secondary me-2"><i class="bi bi-person-circle me-1"></i>Guest Session</span>
                <a href="login.html" class="btn btn-outline-light btn-sm px-3">Log In</a>
                <a href="register.html" class="btn btn-primary btn-sm px-3 fw-bold">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <!-- Input Card -->
                <div class="card border-0 shadow-sm p-4 mb-4 bg-white rounded-4">
                    <h3 class="fw-bold mb-3 text-dark d-flex align-items-center">
                        <i class="bi bi-search text-primary me-2"></i>Target Inspector
                    </h3>
                    <p class="text-muted small mb-4">Analyze remote URL vectors against known global threat repositories and heuristic evaluation matrices.</p>
                    
                    <div class="input-group input-group-lg shadow-sm rounded-3 overflow-hidden">
                        <input type="text" id="publicUrlInput" class="form-control border-0 bg-light" placeholder="Enter target domain or raw URL (e.g., malicious-link.com)">
                        <button type="button" id="publicScanBtn" class="btn btn-primary fw-bold px-4">Analyze Target</button>
                    </div>
                </div>

                <!-- Analysis Results Card (Hidden by Default) -->
                <div id="publicResultCard" class="card mt-4 shadow-sm border-0 border-start border-4 d-none rounded-3">
                    <div id="publicResultContent" class="card-body p-4">
                        <!-- Dynamic content injected via JS -->
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Unified Guest / Login Wall Modal -->
    <div class="modal fade" id="loginWallModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-body p-5 text-center">
                    <!-- JavaScript dynamically rewrites this structure based on the error state -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
