<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SecuriScan</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-lightwhite min-vh-100 d-flex align-items-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <!-- Header -->
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark"><i class="bi bi-shield-lock-fill text-primary"></i> SecuriScan</h2>
                    <p class="text-dark-50">Create your security research account</p>
                </div>

                <!-- Registration Card -->
                <div class="card bg-dark border border-secondary border-opacity-50 shadow-lg p-4 rounded-4">
                    <div class="card-body">
                        <div id="regAlert" class="alert d-none py-2 small" role="alert"></div>
                        
                        <form id="regForm" autocomplete="off">
                            <!-- Username -->
                            <div class="mb-3">
                                <label class="form-label small text-uppercase fw-bold text-white-50">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-secondary border-0 text-white"><i class="bi bi-person"></i></span>
<input type="text" id="username" 
       class="form-control bg-light border-0 shadow-none focus-ring-0 text-dark p-3" 
       required autocomplete="off" placeholder="Enter username">                                </div>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label small text-uppercase fw-bold text-white-50">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-secondary border-0 text-white"><i class="bi bi-envelope"></i></span>
<input type="email" id="email" 
       class="form-control bg-light border-0 shadow-none focus-ring-0 text-dark p-3" 
       required placeholder="Enter email">                                </div>
                            </div>
                            
                            <!-- Password -->
                            <div class="mb-4">
                                <label class="form-label small text-uppercase fw-bold text-white-50">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-secondary border-0 text-white"><i class="bi bi-lock"></i></span>
<input type="password" id="password" 
       class="form-control bg-light border-0 shadow-none focus-ring-0 text-dark p-3" 
       required autocomplete="new-password" placeholder="••••••••">                                    <button type="button" class="btn btn-secondary border-0 px-3" onclick="togglePass()">
                                        <i class="bi bi-eye" id="toggleIcon"></i>
                                    </button>
                                </div>
                            </div>

                            <button type="submit" id="regBtn" class="btn btn-primary w-100 fw-bold py-3 shadow">REGISTER ACCOUNT</button>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <p class="text-dark-50 small">Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Sign In</a></p>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Force Reset on Page Load (Fixes stale 'Registering' button state)
        window.addEventListener('pageshow', () => {
            const btn = document.getElementById('regBtn');
            const form = document.getElementById('regForm');
            btn.innerText = "REGISTER ACCOUNT";
            btn.disabled = false;
            form.reset();
        });

        // Password Visibility Toggle
        function togglePass() {
            const p = document.getElementById('password');
            const i = document.getElementById('toggleIcon');
            if (p.type === "password") {
                p.type = "text";
                i.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                p.type = "password";
                i.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        // Registration Logic
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const alertBox = document.getElementById('regAlert');
            
            btn.innerText = "REGISTERING...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('password', document.getElementById('password').value);

            try {
                const res = await fetch('../backend/api_register.php', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.status === 'success') {
                    alertBox.className = "alert alert-success py-2 small";
                    alertBox.innerText = "Registration successful! Redirecting to login...";
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    alertBox.className = "alert alert-danger py-2 small";
                    alertBox.innerText = data.message;
                    btn.innerText = "REGISTER ACCOUNT";
                    btn.disabled = false;
                }
            } catch (err) {
                alertBox.className = "alert alert-danger py-2 small";
                alertBox.innerText = "Connection error. Please try again.";
                btn.innerText = "REGISTER ACCOUNT";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
